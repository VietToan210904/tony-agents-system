services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tony-portfolio-postgres
    environment:
      POSTGRES_DB: tony_portfolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
